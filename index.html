<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PostHog Engineering Impact — Top 5 Contributors</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --high:    #0ea5e9;
      --medium:  #f97316;
      --low:     #94a3b8;
      --bg:      #f1f5f9;
      --card:    #ffffff;
      --border:  #e2e8f0;
      --text:    #0f172a;
      --muted:   #64748b;
      --radius:  12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 28px 24px 48px;
      line-height: 1.5;
    }

    /* ── Header ── */
    .site-header { text-align: center; margin-bottom: 32px; }
    .site-header h1 {
      font-size: 1.45rem; font-weight: 800; letter-spacing: -0.02em;
    }
    .site-header p { color: var(--muted); margin-top: 5px; font-size: 0.88rem; }

    /* ── Grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 1180px;
      margin: 0 auto;
    }
    .cards-grid .card:first-child { grid-column: 1 / -1; }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
    }

    /* ── Card header row ── */
    .card-head {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 18px;
    }
    .rank-badge {
      min-width: 30px; height: 30px;
      border-radius: 50%;
      background: #334155; color: #fff;
      font-weight: 800; font-size: 0.85rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px;
    }
    .rank-1 { background: #f59e0b; }
    .rank-2 { background: #94a3b8; }
    .rank-3 { background: #b45309; }
    .avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      background: var(--border);
    }
    .eng-meta { flex: 1; min-width: 0; }
    .eng-name  { font-size: 1.05rem; font-weight: 700; }
    .narrative { font-size: 0.80rem; color: var(--muted); margin-top: 3px; line-height: 1.45; }
    .score-block { text-align: right; flex-shrink: 0; }
    .score-value { font-size: 1.6rem; font-weight: 800; color: var(--high); line-height: 1; }
    .score-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }

    /* ── Divider ── */
    .divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

    /* ── Charts ── */
    .charts-row {
      display: flex;
      gap: 24px;
      margin-bottom: 14px;
      align-items: flex-start;
    }
    .chart-block { flex: 1; min-width: 0; }
    .chart-label {
      font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .05em;
      color: var(--muted); margin-bottom: 8px;
    }
    .chart-wrap { display: flex; justify-content: center; }
    .chart-legend {
      display: flex; flex-wrap: wrap; gap: 6px 14px;
      margin-top: 8px; justify-content: center;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.72rem; color: var(--muted); }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── Stats row ── */
    .stats-row {
      font-size: 0.80rem; color: var(--muted);
      margin-bottom: 14px;
      display: flex; flex-wrap: wrap; gap: 4px 20px;
    }
    .stat-item strong { color: var(--text); font-weight: 700; }

    /* ── Highlight PRs ── */
    .pr-section h4 {
      font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .05em;
      color: var(--muted); margin-bottom: 10px;
    }
    .pr-item {
      display: grid;
      grid-template-columns: auto 1fr;
      grid-template-rows: auto auto;
      column-gap: 10px;
      row-gap: 2px;
      margin-bottom: 10px;
      align-items: baseline;
    }
    .tier-badge {
      padding: 2px 8px; border-radius: 4px;
      font-size: 0.62rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .05em;
      white-space: nowrap;
    }
    .tier-badge.high   { background: #e0f2fe; color: #0369a1; }
    .tier-badge.medium { background: #fff7ed; color: #c2410c; }
    .tier-badge.low    { background: #f1f5f9; color: #475569; }
    .pr-link {
      color: var(--text); font-size: 0.83rem; font-weight: 500;
      text-decoration: none; line-height: 1.4;
    }
    .pr-link:hover { color: var(--high); text-decoration: underline; }
    .pr-rationale {
      grid-column: 2; font-size: 0.76rem; color: var(--muted); line-height: 1.4;
    }

    /* ── Methodology ── */
    .methodology {
      max-width: 1180px; margin: 28px auto 0;
      padding: 20px 24px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .methodology h3 {
      font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--muted); margin-bottom: 10px;
    }
    .methodology p { font-size: 0.82rem; color: var(--muted); line-height: 1.6; margin-bottom: 6px; }
    .methodology p:last-child { margin-bottom: 0; }
    .methodology strong { color: var(--text); }
    .methodology a { color: var(--high); }

    @media (max-width: 760px) {
      .cards-grid { grid-template-columns: 1fr; }
      .cards-grid .card:first-child { grid-column: auto; }
      .charts-row { flex-direction: column; }
    }
  </style>
</head>

  <div id="root"></div>
  <script>
    "use strict";
    const TOP5       = window.__TOP5__       || { top_5: [], metadata: {} };
    const NARRATIVES = (window.__NARRATIVES__ || {}).narratives || {};

    const TIER_COLORS = { high: "#0ea5e9", medium: "#f97316", low: "#94a3b8" };
    const CAT_COLORS  = {
      bug_fix:        "#ef4444",
      feature:        "#3b82f6",
      performance:    "#10b981",
      refactor:       "#8b5cf6",
      infrastructure: "#f59e0b",
      security:       "#dc2626",
      cleanup:        "#94a3b8",
      documentation:  "#6366f1",
      unknown:        "#d1d5db",
    };

    function esc(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function catName(k) { return k.replace(/_/g, " "); }

    function legendHTML(labels, colors) {
      return labels.map((l, i) =>
        `<span class="legend-item">
           <span class="legend-dot" style="background:${colors[i]}"></span>${esc(l)}
         </span>`
      ).join("");
    }

    function makeCard(eng, rank) {
      const narrative   = NARRATIVES[eng.author] || "";
      const tiers       = eng.impact_tiers     || {};
      const cats        = eng.work_categories  || {};
      const tierId      = `tier-${rank}`;
      const catId       = `cat-${rank}`;
      const rankClass   = rank <= 3 ? `rank-${rank}` : "";

      // Tier legend (H / M / L counts)
      const tierLegend  = [
        `<span class="legend-item"><span class="legend-dot" style="background:${TIER_COLORS.high}"></span>High: ${tiers.high||0}</span>`,
        `<span class="legend-item"><span class="legend-dot" style="background:${TIER_COLORS.medium}"></span>Med: ${tiers.medium||0}</span>`,
        `<span class="legend-item"><span class="legend-dot" style="background:${TIER_COLORS.low}"></span>Low: ${tiers.low||0}</span>`,
      ].join("");

      // Category legend (top 5)
      const catEntries  = Object.entries(cats).slice(0, 6);
      const catLegend   = catEntries.map(([k, v]) =>
        `<span class="legend-item">
           <span class="legend-dot" style="background:${CAT_COLORS[k]||CAT_COLORS.unknown}"></span>
           ${esc(catName(k))} ${Math.round(v*100)}%
         </span>`
      ).join("");

      // Stats
      const stats = [
        `<span class="stat-item"><strong>${eng.pr_count||0}</strong> PRs</span>`,
        `<span class="stat-item"><strong>${eng.non_trivial_pr_count||0}</strong> substantive</span>`,
        `<span class="stat-item"><strong>${eng.reviews_given||0}</strong> reviews given</span>`,
        `<span class="stat-item"><strong>${eng.distinct_authors_reviewed||0}</strong> authors reviewed</span>`,
        `<span class="stat-item">tier score <strong>${(eng.tier_score||0).toFixed(1)}</strong></span>`,
      ].join("");

      // Highlight PRs
      const prs = (eng.highlight_prs || []).map(pr => {
        const tier = (pr.impact_tier || "low").toLowerCase();
        const url  = `https://github.com/PostHog/posthog/pull/${pr.number}`;
        return `
          <div class="pr-item">
            <span class="tier-badge ${esc(tier)}">${tier.toUpperCase()}</span>
            <a class="pr-link" href="${esc(url)}" target="_blank" rel="noopener">
              #${pr.number} ${esc((pr.title||"").slice(0,90))}
            </a>
            ${pr.rationale
              ? `<span class="pr-rationale">${esc(pr.rationale)}</span>`
              : ""}
          </div>`;
      }).join("");

      return `
        <div class="card">
          <div class="card-head">
            <div class="rank-badge ${rankClass}">${rank}</div>
            <img class="avatar"
                 src="https://github.com/${esc(eng.author)}.png?size=96"
                 alt="${esc(eng.author)}"
                 loading="lazy"
                 onerror="this.onerror=null;this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 52 52%22%3E%3Crect fill=%22%23e2e8f0%22 width=%2252%22 height=%2252%22/%3E%3C/svg%3E'" />
            <div class="eng-meta">
              <div class="eng-name">${esc(eng.author)}</div>
              ${narrative ? `<p class="narrative">${esc(narrative)}</p>` : ""}
            </div>
            <div class="score-block">
              <div class="score-value">${(eng.final_score||0).toFixed(2)}</div>
              <div class="score-label">impact score</div>
            </div>
          </div>

          <hr class="divider" />

          <div class="charts-row">
            <div class="chart-block">
              <div class="chart-label">Impact Tiers</div>
              <div class="chart-wrap">
                <canvas id="${tierId}" width="140" height="140"></canvas>
              </div>
              <div class="chart-legend">${tierLegend}</div>
            </div>
            <div class="chart-block">
              <div class="chart-label">Work Categories</div>
              <div class="chart-wrap">
                <canvas id="${catId}" width="140" height="140"></canvas>
              </div>
              <div class="chart-legend">${catLegend}</div>
            </div>
          </div>

          <div class="stats-row">${stats}</div>
          <hr class="divider" />

          <div class="pr-section">
            <h4>Highlight PRs</h4>
            ${prs || '<p style="font-size:.8rem;color:var(--muted)">No PRs scored.</p>'}
          </div>
        </div>`;
    }

    function initDoughnut(id, labels, data, colors) {
      const ctx = document.getElementById(id);
      if (!ctx) return;
      new Chart(ctx, {
        type: "doughnut",
        data: {
          labels,
          datasets: [{
            data,
            backgroundColor: colors,
            borderWidth: 2,
            borderColor: "#fff",
            hoverBorderColor: "#fff",
          }],
        },
        options: {
          responsive: false,
          cutout: "62%",
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => ` ${ctx.label}: ${ctx.formattedValue}`,
              },
            },
          },
          animation: { duration: 400 },
        },
      });
    }

    function renderDashboard() {
      const root = document.getElementById("root");
      const meta = TOP5.metadata || {};
      const date = new Date().toLocaleDateString("en-US", { month: "long", year: "numeric" });

      root.innerHTML = `
        <header class="site-header">
          <h1>PostHog Engineering Impact &mdash; Top 5 Contributors (90 days)</h1>
          <p>Evaluated on code influence, collaboration, and reliability &nbsp;&middot;&nbsp; ${date}</p>
        </header>
        <div class="cards-grid" id="cards-grid"></div>
        <section class="methodology">
          <h3>Methodology</h3>
          <p><strong>Scoring pipeline:</strong> Each merged PR was assigned
          structural signals — review depth, file diversity, linked issues, and label
          weights — producing a combined heuristic score. An LLM then categorised
          each PR and assigned a <strong>high / medium / low</strong> impact tier.
          Engineer scores combine tier-weighted PR volume (50 %), collaboration
          activity (30 %), and structural heuristics (20 %).</p>
          <p><strong>High impact</strong> means the PR touched critical code paths,
          attracted substantive reviewer scrutiny, closed tracked issues, or carried
          a bug-fix, security, or performance label.</p>
          <p><strong>Data window:</strong> Merged PRs in the last 90 days from the
          public <a href="https://github.com/PostHog/posthog" target="_blank"
          rel="noopener">PostHog/posthog</a> repository on GitHub. Dependency bumps,
          doc-only edits under 20 lines, and bot PRs are excluded before scoring.</p>
        </section>`;

      const grid    = document.getElementById("cards-grid");
      const charts  = [];

      (TOP5.top_5 || []).forEach((eng, i) => {
        const rank = i + 1;
        grid.insertAdjacentHTML("beforeend", makeCard(eng, rank));

        const tiers = eng.impact_tiers || {};
        charts.push({
          tierId:  `tier-${rank}`,
          catId:   `cat-${rank}`,
          tierLabels: ["High", "Medium", "Low"],
          tierData:   [tiers.high||0, tiers.medium||0, tiers.low||0],
          tierColors: [TIER_COLORS.high, TIER_COLORS.medium, TIER_COLORS.low],
          catEntries: Object.entries(eng.work_categories || {}).slice(0, 7),
        });
      });

      // Initialise charts after all cards are in the DOM
      charts.forEach(({ tierId, catId, tierLabels, tierData, tierColors, catEntries }) => {
        initDoughnut(tierId, tierLabels, tierData, tierColors);

        const catLabels = catEntries.map(([k]) => catName(k));
        const catData   = catEntries.map(([, v]) => Math.round(v * 1000) / 10);
        const catColors = catEntries.map(([k]) => CAT_COLORS[k] || CAT_COLORS.unknown);
        initDoughnut(catId, catLabels, catData, catColors);
      });
    }

    document.addEventListener("DOMContentLoaded", renderDashboard);
  </script>
</body>
</html>
